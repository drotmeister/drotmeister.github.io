<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
    max-width: 800px;
    margin: 40px auto;
    padding: 0 20px;
    font-size: 16px;
  }

  a {
    color: #0366d6;
    text-decoration: none;
  }
  
  /* ESTA É A NOVA REGRA QUE ADICIONOU */
  header a {
    margin: 0 15px; 
    display: inline-block;
    font-size: 1.25em; /* <-- Esta linha aumenta o tamanho da letra */
    border-bottom: none !important; /* Esconde COMPLETAMENTE a linha cinza */
    font-weight: normal !important; /* Forces standard weight, removing theme bold */
  }

  a:hover {
    text-decoration: underline;
  }

  header {
    margin-bottom: 40px;
    padding-bottom: 20px;
  }
    h1, h2 {
  border-bottom: none !important; /* Remove a linha de todos os H2 */
}
</style>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      }
    };
  </script>
  <script id="MathJax-script" async 
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
  </script>
</head>
<body>

  <header>
    {% include nav.html %}
  </header>

  <main>
    {{ content }}
  </main>

</body>
</html>
